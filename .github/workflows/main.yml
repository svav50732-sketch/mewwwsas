name: Render video

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Render
        run: npx remotion render Main out/video.mp4
      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out/video.mp4
